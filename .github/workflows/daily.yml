name: TradingEdge Discord Bot
on:
  schedule:
    - cron: '30 13,19,1 * * *'  # 9:30AM, 3:30PM, 9:30PM EDT (UTC)
  workflow_dispatch:  # Manual test button

jobs:
  post-updates:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
    
    - name: Install dependencies
      run: |
        pip install --upgrade pip
        pip install feedparser requests beautifulsoup4 lxml
    
    - name: Run TradingEdge bot
      run: python bot.py
    
    - name: Notify success
      if: success()
      run: echo "✅ Bot ran successfully - check Discord!"

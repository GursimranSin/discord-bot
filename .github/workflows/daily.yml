name: Reddit to Discord

on:
  schedule:
    - cron: "0 14 * * *"  # ~9 AM EST/EDT (14:00 UTC)
    - cron: "0 2 * * *"   # ~9 PM EST/EDT (02:00 UTC next day)
  workflow_dispatch:

jobs:
  reddit-discord:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          pip install feedparser requests

      - name: Run script
        env:
          WEBHOOK_URL: ${{ secrets.WEBHOOK_URL }}
        run: |
          python bot.py

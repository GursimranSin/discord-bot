name: Reddit to Discord

on:
  schedule:
    - cron: '0 13 * * *'  # 9 AM EDT / 10 AM EST
    - cron: '0 1 * * *'   # 9 PM EDT / 10 PM EST  
  workflow_dispatch:

jobs:
  reddit-discord:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          pip install feedparser requests

      - name: Run script
        env:
          WEBHOOK_URL: ${{ secrets.WEBHOOK_URL }}
        run: |
          python bot.py

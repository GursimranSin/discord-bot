name: Reddit to Discord

on:
  schedule:
    # 9 AM ET (handles DST)
    - cron: '0 13 * * *'  # 9 AM EDT
    - cron: '0 14 * * *'  # 9 AM EST

    # 8 PM ET (handles DST)
    - cron: '0 0 * * *'   # 8 PM EDT
    - cron: '0 1 * * *'   # 8 PM EST

  workflow_dispatch:

jobs:
  reddit-discord:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          pip install feedparser requests

      - name: Run script
        env:
          WEBHOOK_URL: ${{ secrets.WEBHOOK_URL }}
        run: |
          python bot.py

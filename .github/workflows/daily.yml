name: TradingEdge Bot
on:
  schedule:
    - cron: '30 13,19,1 * * *'  # 9:30AM, 3:30PM, 9:30PM EDT
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v5
      with:
        python-version: '3.12'
    - run: pip install feedparser requests
    - run: python bot.py
